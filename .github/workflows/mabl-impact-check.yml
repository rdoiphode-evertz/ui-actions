name: mabl Impact Check

on:
  workflow_dispatch:
    inputs:
      staging_url:
        description: 'Staging URL to run mabl tests against (e.g. abc123.eio-ops.staging.evertz.tools)'
        required: true
      pr_number:
        description: 'PR number to post results to'
        required: true
      changed_files:
        description: 'Comma-separated list of changed files (e.g. src/components/browse/player.ts)'
        required: false

jobs:
  mabl-impact:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run mabl impact check
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}
          MABL_WORKSPACE_ID: ${{ secrets.MABL_WORKSPACE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          STAGING_URL: ${{ inputs.staging_url }}
          CHANGED_FILES: ${{ inputs.changed_files }}
        run: node .github/scripts/mabl-impact.js
