name: mabl Impact Check

on:
  issue_comment:
    types: [created, edited]

jobs:
  mabl-impact:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Prevent infinite loop: ignore bot edits (bot updates comment status → fires edited event)
    # created: fires when staging URL comment is posted
    # edited:  fires when reviewer checks a checkbox in the mabl impact comment
    if: >-
      github.event.issue.pull_request != null &&
      github.event.sender.type != 'Bot' &&
      ((github.event.action == 'created' && contains(github.event.comment.body, 'staging.evertz.tools')) ||
      (github.event.action == 'edited' && contains(github.event.comment.body, '<!-- mabl-impact-check -->')))
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save comment bodies to files
        # toJSON() safely encodes multiline strings — parse with JSON.parse in script
        env:
          COMMENT_BODY_JSON: ${{ toJSON(github.event.comment.body) }}
          COMMENT_BODY_FROM_JSON: ${{ toJSON(github.event.changes.body.from) }}
        run: |
          echo "$COMMENT_BODY_JSON" > /tmp/comment-body.json
          echo "$COMMENT_BODY_FROM_JSON" > /tmp/comment-body-from.json

      - name: Get changed files for this PR
        id: changed-files
        if: github.event.action == 'created'
        run: |
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/files \
            --jq '[.[].filename] | join(",")')
          echo "all_changed_files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run mabl impact check
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}
          MABL_WORKSPACE_ID: ${{ secrets.MABL_WORKSPACE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          EVENT_ACTION: ${{ github.event.action }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: node .github/scripts/mabl-impact.js
