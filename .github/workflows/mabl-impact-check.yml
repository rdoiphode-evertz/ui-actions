name: mabl Impact Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      staging_url:
        description: 'Staging URL to run mabl tests against (e.g. abc123.eio-ops.staging.evertz.tools)'
        required: true
      pr_number:
        description: 'PR number to post results to'
        required: true

jobs:
  mabl-impact:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v44
        with:
          separator: ','

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run mabl impact check
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}
          MABL_WORKSPACE_ID: ${{ secrets.MABL_WORKSPACE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          # On pull_request: auto-constructed from commit SHA (adjust pattern to match your staging URL)
          # On workflow_dispatch: use the manually provided URL
          STAGING_URL: ${{ github.event_name == 'pull_request' && format('{0}.eio-ops.staging.evertz.tools', github.sha) || inputs.staging_url }}
          # Space-separated list of changed files (empty on workflow_dispatch)
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: node .github/scripts/mabl-impact.js
