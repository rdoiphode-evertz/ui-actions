name: mabl Manual Run Poller

# Triggered by the Vercel function (api/run.js) after it starts a mabl run.
# Polls mabl until the run completes, then posts a result comment on the PR.

on:
  repository_dispatch:
    types: [mabl-manual-run]

jobs:
  poll-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Poll mabl run and update PR comment
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}
          MABL_WORKSPACE_ID: ${{ secrets.MABL_WORKSPACE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PLAN_ID: ${{ github.event.client_payload.plan_id }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          PLAN_NAME: ${{ github.event.client_payload.plan_name }}
          STAGING_URL: ${{ github.event.client_payload.staging_url }}
          COMMIT_SHA: ${{ github.event.client_payload.commit_sha }}
        run: node .github/scripts/mabl-poll-run.js
